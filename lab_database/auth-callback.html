<!DOCTYPE html>
<html>
<head>
    <title>GitHub Authentication</title>
</head>
<body>
    <div style="text-align: center; padding: 50px; font-family: Arial, sans-serif;">
        <h2>Completing authentication...</h2>
        <p>Please wait while we complete your GitHub authentication.</p>
    </div>

    <script>
        // Extract code and state from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const state = urlParams.get('state');
        const error = urlParams.get('error');

        if (error) {
            // Handle OAuth error
            if (window.opener) {
                window.opener.postMessage({
                    type: 'GITHUB_AUTH_ERROR',
                    error: error || 'OAuth authentication failed'
                }, window.location.origin);
            }
            window.close();
        } else if (code && state) {
            // Store the code and state in localStorage and redirect back to main app
            localStorage.setItem('github_oauth_code', code);
            localStorage.setItem('github_oauth_state', state);
            
            // Redirect back to the main application
            window.location.href = window.location.origin + window.location.pathname.replace('/auth-callback.html', '');
        } else {
            // No code or error - something went wrong
            if (window.opener) {
                window.opener.postMessage({
                    type: 'GITHUB_AUTH_ERROR',
                    error: 'No authorization code received'
                }, window.location.origin);
            }
            window.close();
        }
    </script>
</body>
</html>
